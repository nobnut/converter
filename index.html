<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit Conversion</title>
    <style>
        /* === MATERIAL 3 EXPRESSIVE DARK THEME (From To-Do Project) === */
        :root {
            --md-sys-color-background: #1A1C19;
            --md-sys-color-on-background: #E2E3DD;
            --md-sys-color-surface: #2A2C29; 
            --md-sys-color-on-surface: #E2E3DD;
            --md-sys-color-on-surface-variant: #C2C9BD; 
            --md-sys-color-primary: #9CD67D; 
            --md-sys-color-on-primary: #0C3900;
            --md-sys-color-primary-container: #265108;
            --md-sys-color-error: #FFB4AB; 
            --md-sys-color-error-container: #93000A;
            --md-sys-color-outline: #8C9388;
            
            --radius-large: 28px;
            --radius-medium: 16px;
            --spacing: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: var(--spacing);
        }

        h1 { text-align: center; font-size: 24px; font-weight: 700; margin: 20px 0; }
        
        #main-view { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Form Elements adapted for Material 3 */
        label {
            display: block;
            font-size: 14px;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 8px;
            margin-top: 16px;
        }

        select, input[type="number"] {
            width: 100%;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--radius-medium);
            padding: 14px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--md-sys-color-primary);
        }

        /* Group containers (Cards) */
        .converter-group {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--radius-large);
            padding: 24px;
            margin-top: 24px;
            border: 1px solid var(--md-sys-color-outline);
        }

        .converter-group h3 {
            margin-top: 0;
            color: var(--md-sys-color-primary);
            font-size: 20px;
            text-align: center;
        }

        /* Buttons matching the To-Do app */
        .btn { 
            border: none; 
            border-radius: 100px; 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            padding: 16px;
            margin-top: 24px;
        }
        
        .btn-primary { 
            background-color: var(--md-sys-color-primary-container); 
            color: var(--md-sys-color-primary); 
        }

        /* Result Display Card */
        #result {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-primary);
            border-radius: var(--radius-medium);
            padding: 20px;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            margin-top: 24px;
            line-height: 1.6;
        }

        /* Main Category Dropdown styling */
        .category-select-wrapper {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    // === FROM obj.js ===
    function grpSwitch() {
      var grp = document.getElementById("grpSelect");
      for (var i = 0; i < grp.options.length; i++) {
        var grpName = grp.options[i].value;
        document.getElementById(grpName).style.display = "none";
      }
      document.getElementById(grp.value).style.display = "block";
      document.getElementById("result").style.display = "none"; // Hide result on switch
    }

    function addCommas(nStr) {
      nStr += '';
      var x = nStr.split('.');
      var x1 = x[0];
      var x2 = x.length > 1 ? '.' + x[1] : '';
      var rgx = /(\d+)(\d{3})/;
      while (rgx.test(x1)) {
        x1 = x1.replace(rgx, '$1' + ',' + '$2');
      }
      return x1 + x2;
    }

    function convUnits(c) {
      var amt = document.getElementById(c+ "amt").value;
      var result = document.getElementById("result");

      var frUnit = document.getElementById(c + "fr").value;
      var frVal = units[frUnit];
      var toUnit = document.getElementById(c + "to").value;
      var toVal = units[toUnit];

      if (frVal == undefined || toVal == undefined) {
        result.style.display = "none";
        return;
      }

      var frAbbrev = abbrev[frUnit];
      var toAbbrev = abbrev[toUnit];

      result.style.display = "block";
      result.innerHTML = amt + " " + frAbbrev + " = " + addCommas(((amt*frVal)/toVal).toFixed(3)) + " " + toAbbrev + " <br><br>" + amt + " " + toAbbrev + " = " + addCommas(((amt*toVal)/frVal).toFixed(3)) + " " + frAbbrev;
      return true;
    }

    function convTmp() {
      var amt = document.getElementById("tmpamt").value;
      var frUnit = document.getElementById("tmpfr").value;
      var frVal = units[frUnit]; // Though fetched, actual temp mapping in temp var
      var toUnit = document.getElementById("tmpto").value;
      var toVal = units[toUnit];
      var frAbbrev = abbrev[frUnit];
      var toAbbrev = abbrev[toUnit];
      var res, res2;

      if (frUnit == "uDegc" && toUnit == "uDegf") { res = parseInt(amt) * (9/5) + 32; res2 = (((parseInt(amt)) + 459.67) * (5/9)) - 273.15; }
